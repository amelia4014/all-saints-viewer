<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>All Saints – 3D Globe</title>

    <!-- CesiumJS CDN includes (pattern from CesiumJS Quickstart) -->
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.140/Build/Cesium/Cesium.js"></script>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.140/Build/Cesium/Widgets/widgets.css" rel="stylesheet">

    <style>
      html, body, #cesiumContainer { width:100%; height:100%; margin:0; padding:0; overflow:hidden; }
      #status {
        position:absolute; top:10px; left:10px; z-index:9999;
        background:rgba(0,0,0,.65); color:#fff; padding:10px 12px; border-radius:10px;
        font:13px/1.4 system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        max-width:460px; white-space:pre-line;
      }
      #status b { color:#b7ffb7; }
    </style>
  </head>

  <body>
    <div id="cesiumContainer"></div>
    <div id="status">Starting…</div>

    <script type="module">
      const statusEl = document.getElementById("status");
      const say = (m) => statusEl.textContent = m;

      // --- CONFIG ---
      const LON = 153.3636790;
      const LAT = -28.0590931;

      // MUST exist at https://amelia4014.github.io/all-saints-viewer/globe/model.glb
      const MODEL_URL = "./model.glb";

      // If model is tiny (common), increase scale:
      const MODEL_SCALE = 10.0;       // try 1, 10, 100
      const MIN_PIXEL_SIZE = 256;     // forces visibility even when far away

      // Paste your Cesium ion token (Quickstart uses tokens for World Terrain / OSM buildings)
      Cesium.Ion.defaultAccessToken = "PASTE_YOUR_CESIUM_ION_TOKEN_HERE";

      // 1) Create viewer + terrain (Quickstart pattern)
      say("Creating viewer + terrain…");
      const viewer = new Cesium.Viewer("cesiumContainer", {
        terrain: Cesium.Terrain.fromWorldTerrain(),
      }); // [1](https://docs.blender.org/manual/en/4.0/files/import_export/collada.html)

      // 2) Fly camera to site (Quickstart uses camera.flyTo)
      say("Flying camera to site…");
      viewer.camera.flyTo({
        destination: Cesium.Cartesian3.fromDegrees(LON, LAT, 700),
        orientation: { heading: 0, pitch: Cesium.Math.toRadians(-35), roll: 0 }
      }); // [1](https://docs.blender.org/manual/en/4.0/files/import_export/collada.html)

      // 3) Add a visible marker so you KNOW you're at the right place
      viewer.entities.add({
        name: "Site Marker",
        position: Cesium.Cartesian3.fromDegrees(LON, LAT, 0),
        point: { pixelSize: 16, color: Cesium.Color.YELLOW, outlineColor: Cesium.Color.BLACK, outlineWidth: 2 }
      });

      // 4) Try loading the model using Entity API (simple approach)
      say("Loading model via Entity API…");
      const modelEntity = viewer.entities.add({
        name: "All Saints Model",
        position: Cesium.Cartesian3.fromDegrees(LON, LAT, 0),
        model: {
          uri: MODEL_URL,
          scale: MODEL_SCALE,
          minimumPixelSize: MIN_PIXEL_SIZE
        }
      }); // [2](https://b3d.interplanety.org/en/blender-add-on-blender-3mf/)

      // Fly to it (even if the model is still streaming)
      viewer.flyTo(modelEntity);

      // 5) OPTIONAL: If the entity model fails silently, load it as a Primitive with try/catch
      // Cesium docs recommend constructing models via Model.fromGltfAsync [4](https://www.blenderkit.com/addons/9a5b095b-304a-461f-b3ec-6e4a8044f9c0/)[6](https://docs.ifcopenshell.org/autoapi/ifcopenshell/api/georeference/index.html)
      try {
        say("Also loading model as Primitive (debug)…");
        const pos = Cesium.Cartesian3.fromDegrees(LON, LAT, 0);
        const hpr = new Cesium.HeadingPitchRoll(0, 0, 0);
        const model = await Cesium.Model.fromGltfAsync({
          url: MODEL_URL,
          modelMatrix: Cesium.Transforms.headingPitchRollToFixedFrame(pos, hpr),
          scale: MODEL_SCALE,
          minimumPixelSize: MIN_PIXEL_SIZE
        });
        viewer.scene.primitives.add(model);
        say("✅ Model loaded (Entity + Primitive). If you still don’t see it, increase MODEL_SCALE.");
      } catch (e) {
        console.error("Primitive model load failed:", e);
        say("⚠️ Model load failed.\nOpen F12 → Console and look for errors.\nCommon causes:\n- model.glb 404\n- Git LFS pointer file\n- GLB parse error");
      }

      // 6) Try OSM buildings but do not let failure stop everything
      try {
        const buildings = await Cesium.createOsmBuildingsAsync();
        viewer.scene.primitives.add(buildings);
      } catch (e) {
        console.warn("OSM Buildings failed (continuing):", e);
      } // [1](https://docs.blender.org/manual/en/4.0/files/import_export/collada.html)
    </script>
  </body>
</html>
``
