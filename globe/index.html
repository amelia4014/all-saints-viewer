<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>All Saints – 3D Globe</title>

    <!-- CesiumJS from CDN (pattern shown in Cesium Quickstart) -->
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.140/Build/Cesium/Cesium.js"></script>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.140/Build/Cesium/Widgets/widgets.css" rel="stylesheet" />

    <style>
      html, body, #cesiumContainer { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; }
    </style>
  </head>

  <body>
    <div id="cesiumContainer"></div>

    <script type="module">
      // 1) Set your Cesium ion token (required for ion content like World Terrain)
      // Get token from https://ion.cesium.com/tokens (as shown in the Quickstart)
      Cesium.Ion.defaultAccessToken = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiIxOWU0MWE0YS1jMDcxLTQxNjItODczMi0yOTYyYmU4MmIyNTYiLCJpZCI6NDIyMTYxLCJpYXQiOjE3NzY5MTQ5MTZ9.kDViDMu7RiP_KDWaaaptRxgKLPVvLlEh-KiE-gh_kdQ";

      // 2) Create the globe viewer with global terrain (Quickstart uses Terrain.fromWorldTerrain)
      const viewer = new Cesium.Viewer("cesiumContainer", {
        terrain: Cesium.Terrain.fromWorldTerrain(),
      });

      // 3) Add OSM 3D buildings (Quickstart adds OSM buildings via createOsmBuildingsAsync)
      const buildings = await Cesium.createOsmBuildingsAsync();
      viewer.scene.primitives.add(buildings);

      // 4) Place your GLB model at the desired coordinates
      // Your earlier KML used approx: lon 153.3636790, lat -28.0590931
      const lon = 153.3636790;
      const lat = -28.0590931;
      const heightMeters = 0; // start at 0; adjust later if it floats/sinks

      const position = Cesium.Cartesian3.fromDegrees(lon, lat, heightMeters);

      // Optional orientation (heading/pitch/roll). Useful if model faces the wrong direction.
      const heading = Cesium.Math.toRadians(0); // tweak this (e.g. 90, 180) if needed
      const pitch = Cesium.Math.toRadians(0);
      const roll  = Cesium.Math.toRadians(0);
      const orientation = Cesium.Transforms.headingPitchRollQuaternion(
        position,
        new Cesium.HeadingPitchRoll(heading, pitch, roll)
      );

      const modelEntity = viewer.entities.add({
        name: "All Saints Model",
        position,
        orientation,
        model: {
          uri: "./model.glb",
          scale: 1.0,
          minimumPixelSize: 64
        }
      });

      // 5) Fly to the model
      viewer.flyTo(modelEntity);
    </script>
  </body>
</html>
``
