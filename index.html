<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>3D Model Viewer</title>

    <!-- model-viewer from unpkg CDN -->
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

    <style>
      html, body { height: 100%; margin: 0; }
      body { background: #f3f3f3; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; }
      model-viewer { width: 100vw; height: 100vh; }
      .hint {
        position: fixed;
        left: 12px;
        bottom: 12px;
        padding: 8px 10px;
        background: rgba(0,0,0,0.6);
        color: #fff;
        border-radius: 8px;
        font-size: 13px;
      }
    </style>
  </head>

  <body>
    <model-viewer src="model.glb"
                  alt="3D model"
                  camera-controls
                  auto-rotate
                  shadow-intensity="1">
    </model-viewer>

    <div class="hint">Drag to rotate • Scroll to zoom • Right-drag to pan</div>
  </body>
</html>
